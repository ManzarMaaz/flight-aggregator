services:
  # 1. The Database (PGVector)
  flight_postgres:
    image: pgvector/pgvector:pg15
    container_name: flight_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flight_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 2. The Message Broker (Redis)
  redis:
    image: redis:7-alpine
    container_name: flight_redis
    ports:
      - "6379:6379"

  # 3. The Web API (FastAPI)
  web:
    build: .
    container_name: flight_fastapi
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@flight_postgres:5432/flight_db
      - REDIS_HOST=flight_redis
    depends_on:
      - flight_postgres
      - redis

  # 4. The Muscle (Celery Worker)
  worker:
    build: .
    container_name: flight_celery_worker
    command: celery -A app.celery_app worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@flight_postgres:5432/flight_db
      - REDIS_HOST=flight_redis
    depends_on:
      - flight_postgres
      - redis

  # 5. The Brain/Scheduler (Celery Beat)
  beat:
    build: .
    container_name: flight_celery_beat
    command: celery -A app.celery_app beat --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@flight_postgres:5432/flight_db
      - REDIS_HOST=flight_redis
    depends_on:
      - flight_postgres
      - redis

# Top-level volume declaration belongs at the very bottom
volumes:
  pgdata:
    driver: local
